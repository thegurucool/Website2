<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log in | theGurucool.ai</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
.login-wrap{min-height:100vh;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.login-logo{margin-bottom:3rem;}
.login-logo img{height:28px;width:auto;}
.login-pill{display:inline-block;background:rgba(244,123,90,.12);border:1px solid rgba(244,123,90,.25);color:var(--orange);font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;padding:.35rem .85rem;border-radius:50px;margin-bottom:1.5rem;font-family:'Montserrat',sans-serif;}
.login-wrap h1{font-family:'Montserrat',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:400;color:var(--chalk);line-height:1.15;letter-spacing:-.5px;margin-bottom:1rem;}
.login-wrap h1 em{font-style:italic;color:var(--orange);}
.login-sub{font-size:1rem;color:var(--chalk-dim);line-height:1.7;font-weight:300;max-width:440px;margin:0 auto 2.5rem;}
.login-cta{display:inline-block;background:var(--orange);color:#fff;font-family:'Montserrat',sans-serif;font-size:.95rem;font-weight:600;padding:.9rem 2rem;border-radius:8px;text-decoration:none;letter-spacing:.2px;box-shadow:3px 3px 0 rgba(255,255,255,.12);}
.login-cta:hover{opacity:.9;}
.login-back{margin-top:2rem;font-size:.82rem;color:rgba(240,237,232,.3);font-family:'Montserrat',sans-serif;}
.login-back a{color:rgba(240,237,232,.3);text-decoration:none;transition:color .15s;}
.login-back a:hover{color:var(--orange);}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <a href="index.html"><picture><source srcset="/images/logo.webp" type="image/webp"><img src="/images/logo.png" alt="theGurucool.ai"></picture></a>
  </div>
  <span class="login-pill">Coming Soon</span>
  <h1>The platform is <em>on its way</em></h1>
  <p class="login-sub">We are currently in early access. Join the waitlist and we will send you your login link the moment your spot is ready.</p>
  <a class="login-cta" href="index.html#waitlist">Join the waitlist →</a>
  <p class="login-back"><a href="index.html">← Back to home</a></p>
</div>
</body>
</html>
